name: Build

on:
  push: {}
  workflow_dispatch: {}

env:
  OBICO_REPO: TheSpaghettiDetective/obico-server
  OBICO_BRANCH: release
  OBICO_REF: 9b73caa7b373e89fd23bf2fed646e629ee602640

jobs:
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ env.OBICO_REPO }}
          ref: ${{ env.OBICO_REF }}
      - name: Add frontend
        run: |
          mv frontend backend/
          echo 'RUN ln -s /app/frontend /frontend' >> backend/Dockerfile
      - id: short-sha
        name: Get short sha
        run: echo "SHA=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: |
            ghcr.io/gabe565/obico/web
          tags: |
            type=raw,priority=1000,value=latest
            type=raw,value=${{ env.OBICO_BRANCH }}
            type=raw,value=sha-${{ steps.short-sha.outputs.SHA }}
            type=raw,value=sha-${{ env.OBICO_REF }}
          labels: |
            org.opencontainers.image.title=Obico Web
            maintainer=gabe565
            org.opencontainers.image.vendor=gabe565
            org.opencontainers.image.description=Prebuilt Obico web container
            org.opencontainers.image.source=https://github.com/${{ env.OBICO_REPO }}
            org.opencontainers.image.revision=${{ env.OBICO_REF }}
            org.opencontainers.image.licenses=AGPL-3.0
      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
        with:
          platforms: arm64
      - name: Set up Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Login to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Build and Push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: backend
          pull: true
          push: ${{ github.ref == 'refs/heads/main' }}
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-ml-api:
    name: Build ML API
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ env.OBICO_REPO }}
          ref: ${{ env.OBICO_REF }}
      - id: short-sha
        name: Get short sha
        run: echo "SHA=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: |
            ghcr.io/gabe565/obico/ml-api
          tags: |
            type=raw,priority=1000,value=latest
            type=raw,value=${{ env.OBICO_BRANCH }}
            type=raw,value=sha-${{ steps.short-sha.outputs.SHA }}
            type=raw,value=sha-${{ env.OBICO_REF }}
          labels: |
            org.opencontainers.image.title=Obico ML API
            maintainer=gabe565
            org.opencontainers.image.vendor=gabe565
            org.opencontainers.image.description=Prebuilt Obico ML API container
            org.opencontainers.image.source=https://github.com/${{ env.OBICO_REPO }}
            org.opencontainers.image.revision=${{ env.OBICO_REF }}
            org.opencontainers.image.licenses=AGPL-3.0
      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
        with:
          platforms: arm64
      - name: Set up Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Login to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Build and Push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ml_api
          pull: true
          push: ${{ github.ref == 'refs/heads/main' }}
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
